<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarvs TV</title>
    <!-- Collegamenti CSS -->
    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/tv.css">
    <link rel="stylesheet" href="../assets/css/animations.css">
    <!-- Font Awesome (se necessario) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header (puoi includere lo stesso header di index.html se vuoi mantenere la navigazione) -->
    <header class="header">
        <nav class="nav main-nav">
            <div class="logo">
                <img src="../assets/Icons/logo.png" alt="CLARVS Logo">
                <span>CLARVS</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" class="nav-link">Home</a></li>
                <li><a href="roster.html" class="nav-link">Roster</a></li>
                <li><a href="staff.html" class="nav-link">Staff</a></li>
                <li><a href="tv.html" class="nav-link active">Clarvs TV</a></li>
                <li class="staff-only" style="display: none;">
                    <a href="scouting.html" class="nav-link">Scouting</a>
                </li>
            </ul>
            <button class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </nav>
    </header>

    <!-- Contenuto principale (il tuo contenuto esistente) -->
    <main class="main-container">
        <div class="page-content">
            <div class="tv-page">
                <h1>Clarvs TV</h1>
                <div class="tv-main-layout">
                    <div class="tv-left-section">
                        <div class="tv-container">
                            <div class="tv-screen" id="tv-screen"></div>
                            <div class="tv-controls">
                                <button id="fullscreen-btn">Schermo Intero</button>
                                <div class="stream-status" id="stream-status">
                                    <span class="dot"></span>
                                    <span>Live: Nessun stream attivo</span>
                                </div>
                            </div>
                        </div>
                        <div class="schedule">
                            <h2>Programmazione</h2>
                            <div class="schedule-list" id="schedule-list">
                                <!-- La programmazione verrà caricata qui -->
                            </div>
                        </div>
                    </div>
                    
                    <div class="tv-chat-section">
                        <div class="chat-container">
                            <div class="chat-header">
                                <h3><i class="fas fa-comments"></i> Chat Live</h3>
                                <div class="chat-viewers">
                                    <i class="fas fa-users"></i>
                                    <span id="viewer-count">0</span> online
                                </div>
                            </div>
                            <div class="chat-messages" id="chat-messages">
                                <div class="chat-welcome">
                                    <i class="fas fa-tv"></i>
                                    <p>Benvenuto nella chat di Clarvs TV!</p>
                                    <p>Rispetta le regole e divertiti! 🎮</p>
                                </div>
                            </div>
                            <div class="chat-input-section">
                                <div class="chat-input-container">
                                    <input 
                                        type="text" 
                                        id="chat-input" 
                                        placeholder="Scrivi un messaggio..." 
                                        maxlength="200"
                                        autocomplete="off"
                                    >
                                    <button id="chat-send-btn" disabled>
                                        <i class="fas fa-paper-plane"></i>
                                    </button>
                                </div>
                                <div class="chat-username-setup" id="username-setup">
                                    <input 
                                        type="text" 
                                        id="username-input" 
                                        placeholder="Il tuo nickname..." 
                                        maxlength="20"
                                        autocomplete="off"
                                    >
                                    <button id="username-set-btn">Imposta Nome</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer (puoi includere lo stesso footer di index.html) -->
    <footer class="footer">
        <div class="social-links">
            <a href="https://twitter.com/clarvsesport" target="_blank"><i class="fab fa-twitter"></i></a>
            <a href="https://www.instagram.com/clarvs.gg/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@clarvs" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://x.com/ClarvsTeam" target="_blank"><i class="fab fa-twitter"></i></a>
        </div>
        <p>&copy; 2019 Clarvs Esport. Tutti i diritti riservati.</p>
    </footer>

    <!-- Script JavaScript -->
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/streamapi.js"></script>
    <script src="../js/tv.js"></script>
    <script src="../js/tv-chat.js"></script>
</body>
</html>
