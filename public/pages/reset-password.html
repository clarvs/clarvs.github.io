<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarvs - Reset Password</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 188, 212, 0.15);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            margin: 1rem;
        }

        .card h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }

        .sub {
            color: rgba(255, 255, 255, 0.45);
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .fg {
            margin-bottom: 1.25rem;
        }

        .fg label {
            display: block;
            margin-bottom: 0.4rem;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .fg input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 188, 212, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            box-sizing: border-box;
        }

        .fg input:focus {
            outline: none;
            border-color: rgba(0, 188, 212, 0.5);
        }

        .sbtn {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #00bcd4, #0097a7);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .sbtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            display: none;
        }

        .msg.err {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .msg.ok {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .logo-row img {
            height: 36px;
        }

        .logo-row span {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="logo-row"><img src="/assets/images/logo.png" alt="Clarvs"><span>CLARVS</span></div>
        <h1><i class="fas fa-key" style="color:#00bcd4;"></i> Nuova Password</h1>
        <p class="sub">Scegli una nuova password per il tuo account staff.</p>
        <div id="load-msg" style="color:rgba(255,255,255,0.5);text-align:center;padding:1.5rem 0;">
            <i class="fas fa-spinner fa-spin"></i> Verifica link...
        </div>
        <form id="reset-form" style="display:none;">
            <div class="fg"><label for="r-pw">Nuova Password *</label><input type="password" id="r-pw"
                    placeholder="Minimo 8 caratteri" minlength="8" required></div>
            <div class="fg"><label for="r-pw2">Conferma Password *</label><input type="password" id="r-pw2"
                    placeholder="Ripeti la password" required></div>
            <button type="submit" class="sbtn"><i class="fas fa-check"></i> Imposta Password</button>
        </form>
        <div id="err-msg" class="msg err"></div>
        <div id="ok-msg" class="msg ok"></div>
    </div>
    <script>
        (function () {
            var loadEl = document.getElementById('load-msg');
            var formEl = document.getElementById('reset-form');
            var errEl = document.getElementById('err-msg');
            var okEl = document.getElementById('ok-msg');
            var accessToken = null;

            function showErr(msg) { errEl.textContent = msg; errEl.style.display = 'block'; }
            function showForm() { loadEl.style.display = 'none'; formEl.style.display = 'block'; }
            function showInvalid() { loadEl.innerHTML = '<span style="color:#ef4444;"><i class="fas fa-times-circle"></i> Link non valido o scaduto. Richiedi un nuovo reset dalla pagina di login.</span>'; }

            // Leggi sia hash (#) che query string (?) per supportare sia implicit che PKCE flow
            function parseParams(str) {
                var p = {};
                str.replace(/^[?#]/, '').split('&').forEach(function (s) {
                    var i = s.indexOf('=');
                    if (i > -1) p[s.slice(0, i)] = decodeURIComponent(s.slice(i + 1));
                });
                return p;
            }

            var hashParams = parseParams(window.location.hash);
            var queryParams = parseParams(window.location.search);

            // Caso 1: Implicit flow — access_token nell'hash
            if (hashParams['access_token'] && hashParams['type'] === 'recovery') {
                accessToken = hashParams['access_token'];
                // Rimuovi token dall'URL: non rimane nella cronologia del browser
                history.replaceState(null, '', window.location.pathname);
                showForm();
                return;
            }

            // Caso 2: PKCE flow — code nel query string
            if (queryParams['code']) {
                fetch('/api/auth/exchange-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: queryParams['code'] })
                })
                    .then(function (r) { return r.json(); })
                    .then(function (d) {
                        if (d.error) { showInvalid(); return; }
                        accessToken = d.access_token;
                        // Rimuovi il code dalla URL
                        history.replaceState(null, '', window.location.pathname);
                        showForm();
                    })
                    .catch(function () { showInvalid(); });
                return;
            }

            // Nessun token trovato
            showInvalid();

            // Submit nuova password
            document.getElementById('reset-form').addEventListener('submit', function (e) {
                e.preventDefault();
                errEl.style.display = 'none';
                var pw = document.getElementById('r-pw').value;
                var pw2 = document.getElementById('r-pw2').value;
                if (pw !== pw2) { showErr('Le password non coincidono.'); return; }
                if (!accessToken) { showErr('Token mancante, richiedi un nuovo reset.'); return; }
                var btn = formEl.querySelector('.sbtn');
                btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvataggio...';
                fetch('/api/auth/reset-password-complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: accessToken, password: pw })
                })
                    .then(function (r) { return r.json(); })
                    .then(function (d) {
                        if (d.error) {
                            showErr(d.error);
                            btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Imposta Password';
                            return;
                        }
                        formEl.style.display = 'none';
                        okEl.innerHTML = '<i class="fas fa-check-circle"></i> Password aggiornata! <a href="/index.html" style="color:#10b981;text-decoration:underline;">Torna alla home</a> e fai login.';
                        okEl.style.display = 'block';
                    })
                    .catch(function () {
                        showErr('Errore di connessione.');
                        btn.disabled = false; btn.innerHTML = '<i class="fas fa-check"></i> Imposta Password';
                    });
            });
        })();
    </script>
</body>

</html>
