<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarvs — Manutenzione</title>
    <link rel="stylesheet" href="/assets/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <!-- Three.js per le particelle -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --primary: #00bcd4;
            --accent: #a78bfa;
            --bg: #030303;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* Canvas per particelle 3D */
        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            max-width: 800px;
        }

        .logo-img {
            width: 80px;
            height: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 15px rgba(0, 188, 212, 0.4));
            animation: pulse-logo 3s infinite ease-in-out;
        }

        .lock-icon {
            font-size: 3.5rem;
            color: var(--primary);
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 188, 212, 0.4));
            animation: pulse-lock 3s infinite ease-in-out;
        }

        @keyframes pulse-lock {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            font-weight: 900;
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 2rem;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Countdown Grid (kept for admin message if needed, but hidden by default) */
        .countdown {
            display: none;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
            opacity: 0.8;
        }

        .timer-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 12px;
            backdrop-filter: blur(5px);
        }

        .timer-num {
            display: block;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .timer-label {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.4;
        }

        .maint-actions {
            margin-top: 4rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .staff-access-container {
            position: relative;
            padding: 1px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .staff-access-container:hover {
            background: linear-gradient(135deg, var(--primary), rgba(167, 139, 250, 0.4));
            box-shadow: 0 0 30px rgba(0, 188, 212, 0.2);
            transform: translateY(-2px);
        }

        .staff-link-premium {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 14px 28px;
            border-radius: 11px;
            border: none;
            transition: all 0.3s;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .staff-access-container:hover .staff-link-premium {
            color: #fff;
            background: rgba(0, 0, 0, 0.4);
        }

        .staff-link-premium i {
            font-size: 0.9rem;
            opacity: 0.8;
            transition: transform 0.3s;
        }

        .staff-access-container:hover .staff-link-premium i {
            transform: rotate(-10deg) scale(1.1);
            opacity: 1;
        }
    </style>
</head>

<body>
    <canvas id="particles-canvas"></canvas>

    <div class="container">
        <div id="branding-section" class="branding-container">
            <img src="/assets/images/logo.png" alt="CLARVS Logo" class="logo-img">
            <h1>CLARVS</h1>
        </div>
        
        <p id="maint-custom-message" style="margin-top: -1rem; margin-bottom: 2.5rem; color: rgba(255,255,255,0.6); font-weight: 400; font-size: 1.1rem; line-height: 1.6; max-width: 550px; margin-left: auto; margin-right: auto; letter-spacing: 0.5px;"></p>

        <div id="countdown" class="countdown">
            <div class="timer-box"><span id="days" class="timer-num">00</span><span class="timer-label">Giorni</span></div>
            <div class="timer-box"><span id="hours" class="timer-num">00</span><span class="timer-label">Ore</span></div>
            <div class="timer-box"><span id="minutes" class="timer-num">00</span><span class="timer-label">Minuti</span></div>
            <div class="timer-box"><span id="seconds" class="timer-num">00</span><span class="timer-label">Secondi</span></div>
        </div>

        <div class="maint-actions">
            <div class="staff-access-container">
                <button id="maint-staff-redirect" class="staff-link-premium">
                    <i class="fas fa-lock"></i> Accesso Staff
                </button>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/interactions.js"></script>
    <script>
        (function() {
            let targetDate = null;
            let timerInterval = null;

            async function init() {
                try {
                    const res = await fetch('/api/maintenance-status');
                    const data = await res.json();

                    // Branding visibility
                    const brandingSection = document.getElementById('branding-section');
                    if (brandingSection) {
                        brandingSection.style.display = data.show_branding !== false ? 'block' : 'none';
                    }

                    // Custom message
                    const msgEl = document.getElementById('maint-custom-message');
                    if (msgEl) msgEl.textContent = data.message || 'Sito in manutenzione. Torneremo presto online.';

                    // Countdown visibility
                    if (data.end_at) {
                        targetDate = new Date(data.end_at).getTime();
                        const now = new Date().getTime();
                        if (targetDate > now) {
                            document.getElementById('countdown').style.display = 'grid';
                            startTimer();
                        }
                    }
                } catch (e) { 
                    console.error('Status fetch error:', e);
                    document.getElementById('maint-custom-message').textContent = 'Sito temporaneamente non disponibile.';
                }
            }

            function startTimer() {
                if (timerInterval) clearInterval(timerInterval);
                timerInterval = setInterval(update, 1000);
                update();
            }

            function update() {
                const now = new Date().getTime();
                const dist = targetDate - now;

                if (dist < 0) {
                    clearInterval(timerInterval);
                    document.getElementById('countdown').style.display = 'none';
                    return;
                }

                const d = Math.floor(dist / (1000 * 60 * 60 * 24));
                const h = Math.floor((dist % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const m = Math.floor((dist % (1000 * 60 * 60)) / (1000 * 60));
                const s = Math.floor((dist % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = d.toString().padStart(2, '0');
                document.getElementById('hours').textContent = h.toString().padStart(2, '0');
                document.getElementById('minutes').textContent = m.toString().padStart(2, '0');
                document.getElementById('seconds').textContent = s.toString().padStart(2, '0');
            }

            function updateBtn() {
                const btn = document.getElementById('maint-staff-redirect');
                if (window.authSystem && window.authSystem.isLoggedIn) {
                    btn.innerHTML = '<i class="fas fa-home" style="margin-right: 8px;"></i> Vai al Pannello';
                }
            }

            init();
            const check = setInterval(() => {
                if (window.authSystem) { updateBtn(); clearInterval(check); }
            }, 100);
        })();
    </script>
</body>
</html>
