name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-audit:
    name: Lint & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint || true
      - name: Security audit
        run: npm audit --audit-level=high
      - name: Check for hardcoded secrets
        run: |
          if grep -rn SUPABASE_SERVICE --include=*.js src/ public/js/; then
            echo ERROR chiave Supabase hardcoded trovata
            exit 1
          fi
          echo Nessun segreto hardcoded trovato.

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Verifica syntax server
        run: node --check server.js
