name: Update Fortnite Stats

on:
  schedule:
    - cron: '0 1 * * *'   # ogni notte alle 01:00 UTC (02:00 Italia)
  workflow_dispatch:        # trigger manuale dalla UI di GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome e Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb google-chrome-stable \
            libgbm1 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 --no-install-recommends

      - name: Run scraper (team + talent)
        env:
          TZ: 'Europe/Rome'
          DISPLAY: ':99'
          SCRAPER_CONCURRENCY: '3'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node scraper/run-scraper-standalone.js

      - name: Commit stats aggiornate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/data/player-stats.json scraper/data/talent-stats.json
          git diff --staged --quiet || git commit -m "chore: aggiorna stats Fortnite $(date +'%Y-%m-%d') [skip ci]"
          git push
