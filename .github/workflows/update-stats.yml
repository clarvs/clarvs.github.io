name: Update Fortnite Stats

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Scraper Fortnite Tracker
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome e Xvfb
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb google-chrome-stable \
            libgbm1 libnss3 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 --no-install-recommends

      - name: Run scraper (team + talent)
        env:
          TZ: Europe/Rome
          DISPLAY: ":99"
          SCRAPER_CONCURRENCY: "1"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" node scraper/run-scraper-standalone.js
